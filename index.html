<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Engineering Bot</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0d1117;
      color: #e6edf3;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 16px;
    }

    h2 {
      margin-bottom: 12px;
      font-size: 20px;
      color: #58a6ff;
    }

    #chat-box {
      width: 100%;
      max-width: 800px;
      flex: 1;
      overflow-y: auto;
      border: 1px solid #30363d;
      border-radius: 10px;
      padding: 16px;
      background: #161b22;
      margin-bottom: 12px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .user-msg { align-self: flex-end; }
    .bot-msg  { align-self: flex-start; }

    .bubble {
      display: inline-block;
      padding: 10px 14px;
      border-radius: 12px;
      max-width: 90vw;
      white-space: pre-wrap;
      line-height: 1.6;
      font-size: 14px;
      word-break: break-word;
    }

    .user-msg .bubble { background: #1f6feb; color: #fff; }
    .bot-msg  .bubble { background: #21262d; color: #e6edf3; border: 1px solid #30363d; }

    .bubble code {
      background: #0d1117;
      padding: 2px 6px;
      border-radius: 4px;
      font-family: monospace;
      font-size: 13px;
      color: #79c0ff;
    }

    .bubble pre {
      background: #0d1117;
      padding: 12px;
      border-radius: 8px;
      overflow-x: auto;
      margin-top: 8px;
      border: 1px solid #30363d;
    }

    .bubble pre code {
      background: none;
      padding: 0;
      color: #e6edf3;
    }

    #input-area {
      display: flex;
      gap: 8px;
      width: 100%;
      max-width: 800px;
    }

    #user-input {
      flex: 1;
      padding: 12px 14px;
      border-radius: 8px;
      border: 1px solid #30363d;
      background: #161b22;
      color: #e6edf3;
      font-size: 15px;
      outline: none;
    }

    #user-input:focus { border-color: #58a6ff; }

    button {
      padding: 12px 20px;
      background: #238636;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 15px;
      font-weight: bold;
      transition: background 0.2s;
      white-space: nowrap;
    }

    button:hover { background: #2ea043; }
    button:disabled { background: #444; cursor: not-allowed; }

    #status {
      font-size: 13px;
      color: #8b949e;
      margin-top: 6px;
      height: 18px;
      text-align: center;
    }
  </style>
</head>
<body>

  <h2>⚙️ Engineering Bot</h2>

  <div id="chat-box">
    <div class="bot-msg">
      <span class="bubble">Hey! I'm your engineering assistant. Ask me to build code, fix bugs, design databases, or anything technical.</span>
    </div>
  </div>

  <div id="input-area">
    <input type="text" id="user-input" placeholder="Ask me anything..." />
    <button id="send-btn" onclick="sendMessage()">Send</button>
  </div>
  <div id="status"></div>

  <script>
    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbx5zSGPOUXIjsBUD1VKEsrjz7HJ2UCRmQuAGr26wxPdaPRO1EY5B30GJBWwO0LLEiPO/exec";

    let chatHistory = [];

    async function sendMessage() {
      const input = document.getElementById("user-input");
      const btn = document.getElementById("send-btn");
      const message = input.value.trim();
      if (!message) return;

      appendMessage("user", message);
      input.value = "";
      btn.disabled = true;
      document.getElementById("status").innerText = "⏳ Thinking...";

      try {
        const response = await fetch(APPS_SCRIPT_URL, {
          method: "POST",
          redirect: "follow",
          headers: { "Content-Type": "text/plain" },
          body: JSON.stringify({ message, history: chatHistory })
        });

        const data = await response.json();
        const reply = data.reply;

        chatHistory.push({ role: "user", content: message });
        chatHistory.push({ role: "assistant", content: reply });

        appendMessage("bot", reply);
        document.getElementById("status").innerText = "";

      } catch (err) {
        document.getElementById("status").innerText = "❌ Error: " + err.message;
        console.error(err);
      }

      btn.disabled = false;
      input.focus();
    }

    function appendMessage(sender, text) {
      const box = document.getElementById("chat-box");
      const div = document.createElement("div");
      div.className = sender === "user" ? "user-msg" : "bot-msg";

      const formatted = text
        .replace(/```(\w+)?\n([\s\S]*?)```/g, '<pre><code>$2</code></pre>')
        .replace(/`([^`]+)`/g, '<code>$1</code>');

      div.innerHTML = `<span class="bubble">${formatted}</span>`;
      box.appendChild(div);
      box.scrollTop = box.scrollHeight;
    }

    document.getElementById("user-input").addEventListener("keypress", function(e) {
      if (e.key === "Enter") sendMessage();
    });
  </script>

</body>
</html>
